<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Warrior's Classic Journey</title>
    <!-- Import Cinzel from Google Fonts for a fantasy inspired headline font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script defer src="js/main.js"></script>
  </head>
  <body>
    <div id="login-screen">
      <video
        id="login-video"
        autoplay
        muted
        loop
        playsinline
      >
        <source src="video/background.mp4" type="video/mp4" />
      </video>
      <div id="login-content">
        <div class="login-panel">
          <h1>A Warrior's Classic Journey</h1>
          <p class="subtitle">
            Welcome adventurer! Click below to enter the world and read about my
            travels.
          </p>
          <div class="login-actions">
            <button id="enter-button">Login</button>
            <button id="video-audio-toggle" class="secondary-login-button" type="button">
              Video Sound: Off
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
