<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WoW Classic Blog Login</title>
    <!-- Import Cinzel from Google Fonts for a fantasy inspired headline font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <!-- Include Three.js from a CDN to build the simple 3D warrior model -->
    <script
      defer
      src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
    ></script>
    <script defer src="js/main.js"></script>
  </head>
  <body>
    <div id="login-screen">
      <div id="login-content">
        <!-- 3D canvas for the warrior model -->
        <canvas id="warriorCanvas"></canvas>
        <div class="login-panel">
          <h1>Enter World of Warcraft Classic</h1>
          <p class="subtitle">
            Welcome adventurer! Click below to enter the world and read about my
            travels.
          </p>
          <button id="enter-button">Enter World</button>
        </div>
      </div>
    </div>
  </body>
</html>
